<!doctype html><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1"><title>Vera Trechos</title><link rel=stylesheet href=https://unpkg.com/leaflet@1.9.4/dist/leaflet.css><style>body{margin:0;height:100vh;display:flex;flex-direction:column;font:12px Arial}header{padding:8px;background:#17301b;color:#fff}header small{display:block;color:#b7d99e;margin-top:3px}button{font-size:11px}#wrap{display:flex;flex:1;min-height:0}aside{width:280px;display:flex;flex-direction:column;background:#1c1c1e;color:#eee}#busca{margin:8px;padding:7px}#st,#lista,#bar,#sel{padding:8px}#lista{overflow:auto;flex:1}.it{padding:7px;border-bottom:1px solid #444;cursor:pointer}.it:hover{background:#29292b}.it small{display:block;color:#aaa}.it i{display:inline-block;width:8px;height:8px;border-radius:50%;background:#4caf50;margin-right:6px}.it i.blue{background:#1e88e5}.dim{opacity:.65}#map{flex:1}.pb{margin-top:6px;display:flex;gap:4px;flex-wrap:wrap}#sel{border-top:1px solid #3b5b3d;background:#152218}#sel button{margin:2px}#legend{position:absolute;z-index:900;right:12px;bottom:22px;background:#151515e8;color:#eee;border:1px solid #555;border-radius:7px;padding:7px;font-size:10px}.lg{margin:4px}.l{display:inline-block;width:20px;height:3px;vertical-align:middle;margin-right:5px}@media(max-width:700px){aside{width:235px}}</style><header><b>Vera Trechos — T1, T2 e T3</b><small>As linhas tracejadas laranja representam continuidades estimadas entre lacunas do circuito.</small><div><button id=btn-t1 onclick="tog('t1')">T1</button><button id=btn-t2 onclick="tog('t2')">T2</button><button id=btn-t3 onclick="tog('t3')">T3</button><button id=btn-cont onclick="tog('cont')">Continuidades</button><button id=btn-ch onclick="tog('ch')">Chaves</button><button id=btn-tr onclick="tog('tr')">Trafos</button><button id=btn-alvo onclick="tog('alvo')">Ativos</button><button id=btn-fim onclick="tog('fim')">Finais</button><button id=btn-base onclick=baseMap()>Mapa</button></div></header><div id=wrap><aside><input id=busca placeholder="Buscar ativo ou últimos 8 dígitos" oninput="list(this.value)"><span id=st></span><div id=lista></div><section id=sel hidden><b>SELEÇÃO</b><div>Início: <span id=si>não definido</span></div><div>Fim: <span id=sf>não definido</span></div><button id=be onclick=between() disabled>Entre início e fim</button><button id=bi onclick=first() disabled>Trecho inicial</button><button id=bf onclick=last() disabled>Do início ao final</button><button onclick=all()>Todos os trechos</button><button id=bc onclick=outCSV() disabled>Exportar CSV</button><button id=bk onclick=outKML() disabled>Exportar KML</button><button onclick=clearSel()>Limpar</button></section><div id=bar>Nenhum alimentador carregado</div></aside><main id=map></main></div><div id=legend><div class=lg><i class=l style="background:#ffd600"></i>T1</div><div class=lg><i class=l style="background:#00e5ff"></i>T2</div><div class=lg><i class=l style="background:#ab47bc"></i>T3</div><div class=lg><i class=l style="background:#ffab00;border-top:1px dashed #ffab00"></i>Continuidade estimada</div></div><script src=https://unpkg.com/leaflet@1.9.4/dist/leaflet.js></script><script src=app-cont.js></script>
