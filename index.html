<!doctype html><meta charset=utf-8><title>Vera Trechos</title><link rel=stylesheet href=https://unpkg.com/leaflet@1.9.4/dist/leaflet.css><style>body{margin:0;height:100vh;display:flex;flex-direction:column;font:12px Arial}header{padding:8px;background:#17301b;color:white}button{font-size:11px}#wrap{display:flex;flex:1}aside{width:280px;display:flex;flex-direction:column;background:#1c1c1e;color:#eee}#busca{margin:8px;padding:7px}#st,#lista,#bar,#sel{padding:8px}#lista{overflow:auto;flex:1}.it{padding:7px;border-bottom:1px solid #444}.it small{display:block}#map{flex:1}.pb{margin-top:6px;display:flex;gap:4px;flex-wrap:wrap}</style><header><b>Vera Trechos — T1, T2 e T3</b><div><button id=btn-t1 onclick="tog('t1')">T1</button><button id=btn-t2 onclick="tog('t2')">T2</button><button id=btn-t3 onclick="tog('t3')">T3</button><button id=btn-ch onclick="tog('ch')">Chaves</button><button id=btn-tr onclick="tog('tr')">Trafos</button><button id=btn-alvo onclick="tog('alvo')">Ativos</button><button id=btn-fim onclick="tog('fim')">Finais</button><button id=btn-base onclick=baseMap()>Mapa</button></div></header><div id=wrap><aside><input id=busca placeholder="Buscar ativo ou últimos 8 dígitos" oninput="list(this.value)"><span id=st></span><div id=lista></div><section id=sel hidden><b>SELEÇÃO</b><div>Início: <span id=si>não definido</span></div><div>Fim: <span id=sf>não definido</span></div><button id=be onclick=between() disabled>Entre início e fim</button><button id=bi onclick=first() disabled>Trecho inicial</button><button id=bf onclick=last() disabled>Do início ao final</button><button onclick=all()>Todos T1 + T2 + T3</button><button id=bc onclick=outCSV() disabled>Exportar CSV</button><button id=bk onclick=outKML() disabled>Exportar KML</button><button onclick=clearSel()>Limpar</button></section><div id=bar>Nenhum alimentador carregado</div></aside><main id=map></main></div><script src=https://unpkg.com/leaflet@1.9.4/dist/leaflet.js></script><script src=app.js></script>
