<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Rede MT — Seleção por Ativo</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#111;height:100vh;display:flex;flex-direction:column}

#hdr{background:#1a2e1a;color:#fff;padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0}
#hdr h1{font-size:13px;font-weight:700;white-space:nowrap}
#hdr p{font-size:10px;color:#8bc34a;margin-top:1px}
.tbtn{padding:5px 9px;border:1.5px solid rgba(255,255,255,.22);border-radius:5px;background:transparent;color:#ccc;font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s}
.tbtn:hover{border-color:rgba(255,255,255,.5);color:#fff}
.tbtn.on{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.5);color:#fff}
.tbtn.sat{border-color:#80cbc4;color:#80cbc4}

#layout{display:flex;flex:1;overflow:hidden}

/* PAINEL */
#painel{width:270px;flex-shrink:0;background:#1c1c1e;color:#f0f0f0;display:flex;flex-direction:column;border-right:1px solid #2a2a2c;overflow:hidden}
#busca-wrap{padding:10px;border-bottom:1px solid #2a2a2c}
#busca{width:100%;padding:7px 10px;background:#2c2c2e;border:1.5px solid #3a3a3c;border-radius:7px;color:#f0f0f0;font-size:12px;font-family:inherit;outline:none}
#busca:focus{border-color:#5c9a5c}
#busca::placeholder{color:#555}
#bs{font-size:10px;color:#555;margin-top:5px;display:flex;gap:8px}
#lista{overflow-y:auto;flex:1}
.gt{padding:5px 10px;font-size:9px;font-weight:700;color:#444;text-transform:uppercase;letter-spacing:.1em;background:#161618;position:sticky;top:0;z-index:1}
.item{padding:8px 10px;border-bottom:1px solid #222;cursor:pointer;display:flex;align-items:flex-start;gap:7px;transition:background .1s}
.item:hover{background:#252527}
.item.done{background:#192619}
.item.na{opacity:.3;pointer-events:none}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px}
.dot-g{background:#4caf50}.dot-b{background:#1976d2}.dot-na{background:#333}
.dot-spin{background:#ff9800;animation:sp .7s ease-in-out infinite}
@keyframes sp{0%,100%{opacity:.3}50%{opacity:1}}
.icod{font-size:11px;font-weight:600;color:#e0e0e0;letter-spacing:.02em}
.isub{font-size:10px;color:#666;margin-top:1px}
.itag{display:inline-block;font-size:9px;padding:1px 5px;border-radius:3px;font-weight:700;margin-top:3px}
.tg{background:#1a3a1a;color:#66bb6a;border:1px solid #2e5a2e}
.tna{background:#222;color:#444;border:1px solid #333}

/* BARRA INFERIOR */
#bar{padding:8px 10px;border-top:1px solid #2a2a2c;background:#161618;font-size:10px;color:#555;display:flex;gap:5px;flex-wrap:wrap;align-items:center;min-height:38px}
.chip{background:#1e3a1e;color:#66bb6a;border:1px solid #2e5a2e;border-radius:4px;padding:2px 7px;font-size:10px;cursor:pointer}
.chip:hover{background:#254425}
#btn-lp{margin-left:auto;padding:4px 9px;background:#3a1a1a;color:#ef9a9a;border:1px solid #5a2a2a;border-radius:5px;font-size:10px;cursor:pointer;font-family:inherit;font-weight:700}

/* SELEÇÃO */
#sel-bar{display:none;padding:8px 10px;background:#1a2e1a;border-top:1px solid #2a5a2a;font-size:11px;color:#a5d6a7;flex-direction:column;gap:6px}
#sel-info{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
#sel-info b{color:#66bb6a}
.seltbtn{padding:5px 10px;border:1.5px solid #4caf50;border-radius:6px;background:transparent;color:#4caf50;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
.seltbtn:hover{background:#1e4d1e}
.seltbtn.red{border-color:#ef5350;color:#ef5350}
.seltbtn.red:hover{background:#3a1a1a}

#map{flex:1}

#legenda{position:absolute;bottom:20px;right:10px;z-index:900;background:rgba(0,0,0,.75);border:1px solid #333;border-radius:10px;padding:10px 13px;font-size:11px;color:#ccc;min-width:175px;backdrop-filter:blur(4px)}
#legenda h4{font-size:9px;color:#555;text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px}
.lg{display:flex;align-items:center;gap:7px;margin-bottom:4px}
.ll{width:20px;border-radius:2px}
.ld{width:9px;height:9px;border-radius:50%}

.leaflet-popup-content-wrapper{background:rgba(10,10,10,.9);color:#e8e8e8;border:1px solid #444;border-radius:8px;backdrop-filter:blur(4px)}
.leaflet-popup-tip{background:#111}
.leaflet-popup-content{font-size:12px;line-height:1.7;min-width:170px}
.popup-title{font-weight:700;font-size:13px;margin-bottom:4px}
.popup-alvo{color:#ff5252;font-weight:700}
.popup-btn{display:block;margin-top:8px;padding:7px 0;background:#1e5a1e;color:#66bb6a;border:1.5px solid #2e7d2e;border-radius:6px;text-align:center;font-weight:700;cursor:pointer;font-size:12px;font-family:inherit;width:100%}
.popup-btn:hover{background:#1a4a1a}
.popup-btn.cancel{background:#3a1a1a;color:#ef5350;border-color:#5a2a2a;margin-top:4px}
</style>
</head>
<body>
<div id="hdr">
  <div><h1>Rede MT — Seleção por Ativo</h1><p>Clique num ativo → carrega o alimentador → selecione trechos a partir da chave</p></div>
  <div style="margin-left:auto;display:flex;gap:5px;flex-wrap:wrap">
    <button class="tbtn on"  id="btn-t1"   onclick="tog('t1')">T1</button>
    <button class="tbtn on"  id="btn-t2"   onclick="tog('t2')">T2</button>
    <button class="tbtn on"  id="btn-ch"   onclick="tog('ch')">Chaves</button>
    <button class="tbtn on"  id="btn-tr"   onclick="tog('tr')">Trafos</button>
    <button class="tbtn on"  id="btn-alvo" onclick="tog('alvo')" style="border-color:#ff5252;color:#ff5252">Alvo</button>
    <button class="tbtn sat" id="btn-base" onclick="trocarBase()">Mapa</button>
  </div>
</div>

<div id="layout">
  <div id="painel">
    <div id="busca-wrap">
      <input id="busca" placeholder="Buscar ativo ou SE..." oninput="filtrar(this.value)">
      <div id="bs"><span id="st-e"></span><span id="st-n"></span></div>
    </div>
    <div id="lista"></div>
    <div id="sel-bar">
      <div id="sel-info"><b id="sel-count">0</b> trechos selecionados</div>
      <div style="display:flex;gap:6px">
        <button class="seltbtn" onclick="exportarSelecao()">Exportar KML</button>
        <button class="seltbtn" onclick="exportarSelecaoCSV()">Exportar CSV</button>
        <button class="seltbtn red" onclick="limparSelecao()">Limpar seleção</button>
      </div>
    </div>
    <div id="bar"><span style="color:#444;font-size:10px">Nenhum alimentador carregado</span></div>
  </div>
  <div id="map"></div>
</div>

<div id="legenda">
  <h4>Legenda</h4>
  <div class="lg"><div class="ll" style="height:3px;background:#FFD600"></div><span>T1 — Tronco</span></div>
  <div class="lg"><div class="ll" style="height:2px;background:#00E5FF"></div><span>T2 — Ramal</span></div>
  <div class="lg"><div class="ll" style="height:3px;background:#00e676"></div><span>Trecho selecionado</span></div>
  <div class="lg"><div class="ld" style="background:#ff1744"></div><span>Ativo de referência</span></div>
  <div class="lg"><div class="ld" style="background:#FF6F00"></div><span>Chave</span></div>
  <div class="lg"><div class="ld" style="background:#fff;border:1.5px solid #333"></div><span>Trafo</span></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── Mapa base ──
const map = L.map('map',{zoomControl:true}).setView([-9.8,-48.5],7);
const TILES = {
  sat: L.tileLayer('https://mt{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}',{attribution:'© Google',maxZoom:21,subdomains:['0','1','2','3']}),
  rua: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OSM',maxZoom:19}),
};
TILES.sat.addTo(map);
let baseAtual='sat';
function trocarBase(){
  map.removeLayer(TILES[baseAtual]);
  baseAtual = baseAtual==='sat'?'rua':'sat';
  TILES[baseAtual].addTo(map);
  document.getElementById('btn-base').textContent = baseAtual==='sat'?'Mapa':'Satélite';
}

const LY={t1:L.layerGroup().addTo(map),t2:L.layerGroup().addTo(map),
          ch:L.layerGroup().addTo(map),tr:L.layerGroup().addTo(map),alvo:L.layerGroup().addTo(map)};
const ON={t1:1,t2:1,ch:1,tr:1,alvo:1};
function tog(k){ON[k]=!ON[k];document.getElementById('btn-'+k).classList.toggle('on',ON[k]);ON[k]?map.addLayer(LY[k]):map.removeLayer(LY[k]);}

// ── Estado global ──
let INDICE={}, NAO=[];
let carregados={};   // circ → dados completos
let boundsC={};
let alvoMkr={};      // cod → marker

// SELEÇÃO
let selLayer = L.layerGroup().addTo(map);  // trechos selecionados (verde)
let selSegs  = [];   // [{c:coords,t:tipo}]
let selCirc  = null; // alimentador da seleção atual
let selChave = null; // chave que originou a seleção

// ── Render Alimentador ──
function renderAlim(circ, d){
  const pts=[];
  // segs = [rLon,rLat,fLon,fLat,tipo,coords]
  d.segs.forEach(s=>{
    const pts2 = s[5].map(c=>[c[1],c[0]]);
    const ln = L.polyline(pts2,{color:s[4]===1?'#FFD600':'#00E5FF',weight:s[4]===1?2.5:1.8,opacity:.9});
    ln.addTo(s[4]===1?LY.t1:LY.t2);
    pts2.forEach(p=>pts.push(p));
  });
  // chaves = [nome,lon,lat,noLon,noLat]
  d.chaves.forEach(c=>{
    const isAlvo = !!INDICE[c[0]];
    if(isAlvo){
      const m=L.circleMarker([c[2],c[1]],{radius:9,fillColor:'#ff1744',color:'#fff',weight:2.5,fillOpacity:1})
        .bindPopup(popupAlvo(c[0],d),{maxWidth:240}).addTo(LY.alvo);
      alvoMkr[c[0]]=m;
    } else {
      L.circleMarker([c[2],c[1]],{radius:4,fillColor:'#FF6F00',color:'#fff',weight:1.5,fillOpacity:.85})
        .bindPopup(popupChave(c[0],c[2],c[1],d)).addTo(LY.ch);
    }
    pts.push([c[2],c[1]]);
  });
  d.trafos.forEach(t=>{
    L.circleMarker([t.lat,t.lon],{radius:3,fillColor:'#fff',color:'#333',weight:1.5,fillOpacity:.95})
      .addTo(LY.tr);
    pts.push([t.lat,t.lon]);
  });
  if(pts.length) boundsC[circ]=L.latLngBounds(pts);
}

// ── Popups ──
function popupAlvo(cod,d){
  return L.popup().setContent(`<div>
    <div class="popup-title popup-alvo">⚑ ${cod}</div>
    <div style="color:#aaa;font-size:10px">${d.circ} · ${d.se}</div>
    <div style="font-size:11px;margin-top:5px;color:#999">Polo: ${d.polo}</div>
    <button class="popup-btn" onclick="iniciarSelecao('${cod}','${d.circ}')">
      Selecionar trecho a partir daqui →
    </button>
  </div>`);
}
function popupChave(cod,lat,lon,d){
  return L.popup().setContent(`<div>
    <div class="popup-title">${cod}</div>
    <div style="color:#aaa;font-size:10px">${d.circ} · ${d.se}</div>
    <button class="popup-btn" onclick="iniciarSelecao('${cod}','${d.circ}',${lat},${lon})">
      Selecionar trecho a partir daqui →
    </button>
  </div>`);
}

// ── SELEÇÃO DOWNSTREAM ──
function iniciarSelecao(cod, circ, latOvr, lonOvr){
  map.closePopup();
  const d = carregados[circ];
  if(!d){ alert('Alimentador não carregado'); return; }

  // Encontrar o nó do grafo associado à chave
  const ch = d.chaves.find(c=>c[0]===cod);
  if(!ch){ alert('Chave não encontrada no grafo'); return; }

  const noLon = ch[3] ?? (lonOvr ?? ch[1]);
  const noLat = ch[4] ?? (latOvr ?? ch[2]);
  const noKey = noLon+'_'+noLat;

  // BFS downstream: a partir do nó da chave, pegar todos os segs cuja "raiz" seja esse nó
  // seg formato: [rLon,rLat,fLon,fLat,tipo,coords]
  // BFS: fila de nós a visitar, começando pelo noKey
  const visitados = new Set([noKey]);
  const fila = [noKey];
  const segsSel = [];

  // Índice: noRaiz → [segIdx, ...]
  const rIdx = {};
  d.segs.forEach((s,i)=>{
    const k = s[0]+'_'+s[1];
    if(!rIdx[k]) rIdx[k]=[];
    rIdx[k].push(i);
  });

  while(fila.length){
    const cur = fila.shift();
    const filhos = rIdx[cur]||[];
    filhos.forEach(si=>{
      const s = d.segs[si];
      segsSel.push(s);
      const fKey = s[2]+'_'+s[3];
      if(!visitados.has(fKey)){
        visitados.add(fKey);
        fila.push(fKey);
      }
    });
  }

  if(!segsSel.length){ alert('Nenhum trecho encontrado a partir desta chave.\nEla pode estar no final da rede ou o snap falhou.'); return; }

  // Limpar seleção anterior
  selLayer.clearLayers();
  selSegs = segsSel;
  selCirc = circ; selChave = cod;

  // Renderizar selecionados em verde brilhante
  segsSel.forEach(s=>{
    const pts = s[5].map(c=>[c[1],c[0]]);
    L.polyline(pts,{color:'#00e676',weight:3.5,opacity:1}).addTo(selLayer);
  });

  // Calcular bounds da seleção e dar zoom
  const allPts = segsSel.flatMap(s=>s[5].map(c=>[c[1],c[0]]));
  if(allPts.length) map.fitBounds(L.latLngBounds(allPts),{padding:[30,30]});

  // Mostrar barra de seleção
  document.getElementById('sel-count').textContent = segsSel.length;
  document.getElementById('sel-bar').style.display = 'flex';
  document.getElementById('sel-info').innerHTML =
    `<b style="color:#66bb6a">${segsSel.length}</b> trechos selecionados a partir de <b style="color:#80cbc4">${cod}</b>`;
}

function limparSelecao(){
  selLayer.clearLayers();
  selSegs=[]; selCirc=null; selChave=null;
  document.getElementById('sel-bar').style.display='none';
}

// ── EXPORTAR ──
function exportarSelecao(){
  if(!selSegs.length){ alert('Nenhum trecho selecionado.'); return; }
  const d = carregados[selCirc];
  let k='<?xml version="1.0" encoding="UTF-8"?>\n<kml xmlns="http://www.opengis.net/kml/2.2">\n<Document>\n';
  k+=`<name>Trecho a partir de ${selChave} — ${selCirc}</name>\n`;
  k+='<Style id="t1"><LineStyle><color>ff00d6FF</color><width>3</width></LineStyle></Style>\n';
  k+='<Style id="t2"><LineStyle><color>ffFF6400</color><width>2</width></LineStyle></Style>\n';
  k+=`<Folder><name>Trechos (${selSegs.length})</name>\n`;
  selSegs.forEach((s,i)=>{
    const coords=s[5].map(c=>c[0]+','+c[1]+',0').join(' ');
    k+=`<Placemark><name>${s[4]===1?'T1':'T2'}_${i+1}</name><styleUrl>#${s[4]===1?'t1':'t2'}</styleUrl><LineString><coordinates>${coords}</coordinates></LineString></Placemark>\n`;
  });
  k+='</Folder>\n</Document>\n</kml>';
  baixar(`trecho_${selChave}_${selCirc}.kml`,k,'application/vnd.google-earth.kml+xml');
}
function exportarSelecaoCSV(){
  if(!selSegs.length){ alert('Nenhum trecho selecionado.'); return; }
  const rows=[['TIPO','ALIMENTADOR','SE','SEG_IDX','LON_INICIO','LAT_INICIO','LON_FIM','LAT_FIM','KM']];
  selSegs.forEach((s,i)=>{
    const ini=s[5][0], fim=s[5][s[5].length-1];
    function hav(lon1,lat1,lon2,lat2){
      const R=6371,p=Math.PI/180;
      const a=Math.sin((lat2-lat1)*p/2)**2+Math.cos(lat1*p)*Math.cos(lat2*p)*Math.sin((lon2-lon1)*p/2)**2;
      return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
    }
    let km=0;
    for(let j=0;j<s[5].length-1;j++) km+=hav(s[5][j][0],s[5][j][1],s[5][j+1][0],s[5][j+1][1]);
    rows.push([s[4]===1?'T1':'T2',selCirc,carregados[selCirc].se,i+1,ini[0],ini[1],fim[0],fim[1],km.toFixed(4)]);
  });
  baixar(`trecho_${selChave}_${selCirc}.csv`,'\uFEFF'+rows.map(r=>r.join(';')).join('\n'),'text/csv');
}
function baixar(nome,c,t){
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([c],{type:t}));
  a.download=nome;document.body.appendChild(a);a.click();document.body.removeChild(a);
}

// ── LISTA ──
function renderLista(f=''){
  const enc=Object.entries(INDICE).filter(([c,i])=>!f||c.includes(f)||i.se.toLowerCase().includes(f)).sort((a,b)=>a[0].localeCompare(b[0]));
  const na=NAO.filter(c=>!f||c.includes(f)).sort();
  document.getElementById('st-e').textContent=enc.length+' encontrados';
  document.getElementById('st-n').textContent=na.length+' não encontrados';
  document.getElementById('lista').innerHTML=
    (enc.length?`<div class="gt">Ativos encontrados (${enc.length})</div>`:'')+
    enc.map(([cod,info])=>`<div class="item${carregados[info.circ]?' done':''}" id="li-${cod}" onclick="selecionarAtivo('${cod}')">
      <div class="dot ${carregados[info.circ]?'dot-b':'dot-g'}"></div>
      <div><div class="icod">${cod}</div><div class="isub">${info.se}</div>
      <span class="itag tg">${info.circ} · ${info.polo}</span></div>
    </div>`).join('')+
    (na.length?`<div class="gt">Não localizados (${na.length})</div>`:'')+
    na.map(cod=>`<div class="item na"><div class="dot dot-na"></div><div><div class="icod">${cod}</div><span class="itag tna">não encontrado</span></div></div>`).join('');
}

function filtrar(v){renderLista(v);}

// ── SELECIONAR ATIVO ──
async function selecionarAtivo(cod){
  const info=INDICE[cod]; if(!info) return;
  const circ=info.circ;
  if(carregados[circ]){
    map.setView([info.lat,info.lon],15,{animate:true});
    setTimeout(()=>{if(alvoMkr[cod])alvoMkr[cod].openPopup();},400);
    return;
  }
  const el=document.getElementById('li-'+cod);
  if(el){el.classList.add('done');el.querySelector('.dot').className='dot dot-spin';}
  try{
    const r=await fetch('alimentadores/'+circ+'.json?t='+Date.now());
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();
    carregados[circ]=d;
    renderAlim(circ,d);
    map.setView([info.lat,info.lon],14,{animate:true});
    setTimeout(()=>{if(alvoMkr[cod])alvoMkr[cod].openPopup();},600);
    atualizarBar();
    renderLista(document.getElementById('busca').value);
  }catch(e){alert('Erro ao carregar '+circ+': '+e.message);}
}

function atualizarBar(){
  const cs=Object.keys(carregados);
  const bar=document.getElementById('bar');
  if(!cs.length){bar.innerHTML='<span style="color:#444;font-size:10px">Nenhum alimentador carregado</span>';return;}
  bar.innerHTML=cs.map(c=>`<span class="chip" onclick="map.fitBounds(boundsC['${c}'],{padding:[20,20]})" title="Zoom: ${c}">${c}</span>`).join('')
    +`<button id="btn-lp" onclick="limparTudo()">Limpar</button>`;
}

function limparTudo(){
  ['t1','t2','ch','tr','alvo'].forEach(k=>LY[k].clearLayers());
  selLayer.clearLayers();
  carregados={}; boundsC={}; alvoMkr={};
  selSegs=[]; selCirc=null; selChave=null;
  document.getElementById('sel-bar').style.display='none';
  atualizarBar(); renderLista(document.getElementById('busca').value);
}

// ── INIT ──
fetch('indice.json').then(r=>r.json()).then(d=>{
  INDICE=d.chaves||{}; NAO=d.nao_encontradas||[];
  renderLista(); atualizarBar();
}).catch(e=>{
  document.getElementById('lista').innerHTML='<div style="padding:20px;color:#555;font-size:12px">Erro ao carregar índice: '+e.message+'</div>';
});
</script>
</body>
</html>
