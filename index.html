<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Rede MT — Seleção por Ativo</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#111;height:100vh;display:flex;flex-direction:column}

/* HEADER */
#hdr{background:#1a2e1a;color:#fff;padding:10px 14px;display:flex;align-items:center;gap:12px;flex-shrink:0}
#hdr h1{font-size:14px;font-weight:700}
#hdr p{font-size:10px;color:#8bc34a;margin-top:1px}
#hdr-right{margin-left:auto;display:flex;gap:6px}
.tbtn{padding:5px 10px;border:1.5px solid rgba(255,255,255,.25);border-radius:6px;background:transparent;color:#fff;font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.tbtn.on{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.55)}

/* LAYOUT */
#layout{display:flex;flex:1;overflow:hidden}

/* PAINEL */
#painel{width:270px;flex-shrink:0;background:#1c1c1e;color:#f0f0f0;display:flex;flex-direction:column;border-right:1px solid #333}

/* BUSCA */
#busca-wrap{padding:10px;border-bottom:1px solid #333}
#busca{width:100%;padding:8px 10px;background:#2c2c2e;border:1px solid #444;border-radius:8px;color:#f0f0f0;font-size:12px;font-family:inherit;outline:none}
#busca::placeholder{color:#666}
#busca:focus{border-color:#5c9a5c}
#busca-stats{font-size:10px;color:#666;margin-top:6px;display:flex;gap:8px}

/* LISTA */
#lista{overflow-y:auto;flex:1}
.grupo-titulo{padding:6px 10px;font-size:9px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.1em;background:#161618;position:sticky;top:0;z-index:1}

.item{padding:9px 10px;border-bottom:1px solid #252527;cursor:pointer;transition:background .1s;display:flex;align-items:flex-start;gap:8px}
.item:hover{background:#252527}
.item.carregado{background:#1e2e1e}
.item.carregando{background:#1e2420;pointer-events:none}
.item.nao-encontrado{opacity:.38;pointer-events:none;cursor:default}

.item-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:3px}
.dot-ok{background:#4caf50}
.dot-loading{background:#ff9800;animation:pulse .8s ease-in-out infinite}
.dot-done{background:#1976d2}
.dot-na{background:#444}

@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

.item-info{flex:1;min-width:0}
.item-cod{font-size:12px;font-weight:600;color:#e0e0e0;letter-spacing:.02em}
.item-sub{font-size:10px;color:#888;margin-top:2px}
.item-tag{display:inline-block;font-size:9px;padding:1px 5px;border-radius:3px;margin-top:3px;font-weight:700}
.tag-circ{background:#1a3a1a;color:#66bb6a;border:1px solid #2e5a2e}
.tag-na{background:#2a2a2a;color:#555;border:1px solid #333}

/* MAPA CARREGADO */
#loaded-bar{padding:8px 10px;border-top:1px solid #333;background:#161618;font-size:10px;color:#666;display:flex;flex-wrap:wrap;gap:4px;align-items:center;min-height:36px}
.loaded-chip{background:#1e3a1e;color:#66bb6a;border:1px solid #2e5a2e;border-radius:4px;padding:2px 7px;font-size:10px;cursor:pointer}
.loaded-chip:hover{background:#1a441a}
#btn-limpar{margin-left:auto;padding:4px 10px;background:#3a1a1a;color:#ef9a9a;border:1px solid #5a2a2a;border-radius:5px;font-size:10px;cursor:pointer;font-family:inherit;font-weight:700}

/* MAPA */
#map{flex:1;background:#1a1a1a}

/* LEGENDA */
#legenda{position:absolute;bottom:20px;right:10px;z-index:900;background:rgba(20,20,20,.92);border:1px solid #333;border-radius:10px;padding:10px 14px;font-size:11px;color:#ccc;min-width:180px;box-shadow:0 2px 14px rgba(0,0,0,.5)}
#legenda h4{font-size:9px;color:#555;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.lg{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.ll{width:22px;border-radius:2px}
.ld{width:10px;height:10px;border-radius:50%}

/* POPUP ESCURO */
.leaflet-popup-content-wrapper{background:#1e1e1e;color:#e0e0e0;border:1px solid #333;border-radius:8px}
.leaflet-popup-tip{background:#1e1e1e}
.leaflet-popup-content{font-size:12px;line-height:1.6}
</style>
</head>
<body>

<div id="hdr">
  <div>
    <h1>Rede MT — Seleção por Ativo de Referência</h1>
    <p>Clique em um ativo para carregar o alimentador completo</p>
  </div>
  <div id="hdr-right">
    <button class="tbtn on" id="btn-t1"   onclick="tog('t1')">T1</button>
    <button class="tbtn on" id="btn-t2"   onclick="tog('t2')">T2</button>
    <button class="tbtn on" id="btn-ch"   onclick="tog('ch')">Chaves</button>
    <button class="tbtn on" id="btn-tr"   onclick="tog('tr')">Trafos</button>
    <button class="tbtn on" id="btn-alvo" onclick="tog('alvo')" style="border-color:#ff5252;color:#ff5252">Alvo</button>
  </div>
</div>

<div id="layout">
  <div id="painel">
    <div id="busca-wrap">
      <input id="busca" placeholder="Buscar ativo ou SE..." oninput="filtrar(this.value)">
      <div id="busca-stats">
        <span id="st-enc"></span>
        <span id="st-na"></span>
      </div>
    </div>

    <div id="lista"></div>

    <div id="loaded-bar">
      <span style="color:#555;font-size:10px;">Nenhum alimentador carregado</span>
    </div>
  </div>

  <div id="map"></div>
</div>

<div id="legenda">
  <h4>Legenda</h4>
  <div class="lg"><div class="ll" style="height:3px;background:#e53935"></div><span>T1 — Tronco</span></div>
  <div class="lg"><div class="ll" style="height:2px;background:#fb8c00"></div><span>T2 — Ramal</span></div>
  <div class="lg"><div class="ld" style="background:#ff1744"></div><span>Ativo de referência</span></div>
  <div class="lg"><div class="ld" style="background:#7e57c2"></div><span>Chaves da rede</span></div>
  <div class="lg"><div class="ld" style="background:#1e88e5;width:7px;height:7px"></div><span>Transformadores</span></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── Tile escuro ──
const map = L.map('map',{zoomControl:true}).setView([-9.8,-48.5],7);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_matter/{z}/{x}/{y}{r}.png',
  {attribution:'© CartoDB',maxZoom:19}).addTo(map);

const LY = {
  t1:   L.layerGroup().addTo(map),
  t2:   L.layerGroup().addTo(map),
  ch:   L.layerGroup().addTo(map),
  tr:   L.layerGroup().addTo(map),
  alvo: L.layerGroup().addTo(map),
};
const ON = {t1:true,t2:true,ch:true,tr:true,alvo:true};

function tog(k){
  ON[k]=!ON[k];
  document.getElementById('btn-'+k).classList.toggle('on',ON[k]);
  ON[k]?map.addLayer(LY[k]):map.removeLayer(LY[k]);
}

// ── Estado ──
let INDICE = {};         // chave → {circ,se,polo,lat,lon}
let NAO_ENCONTRADAS = [];
let carregados = {};     // circ → true
let bounds_circ = {};    // circ → LatLngBounds
let itemAtivo = null;    // código da chave selecionada atualmente
const BASE = 'alimentadores/';

// ── Render lista ──
function renderLista(filtro=''){
  const f = filtro.toLowerCase();
  const lista = document.getElementById('lista');

  const encontrados = Object.entries(INDICE)
    .filter(([cod,info])=> !f || cod.includes(f) || info.se.toLowerCase().includes(f) || info.circ.toLowerCase().includes(f))
    .sort((a,b)=>a[0].localeCompare(b[0]));

  const naos = NAO_ENCONTRADAS
    .filter(cod=> !f || cod.includes(f))
    .sort();

  document.getElementById('st-enc').textContent = encontrados.length + ' encontrados';
  document.getElementById('st-na').textContent  = naos.length   + ' não encontrados';

  lista.innerHTML =
    (encontrados.length ? `<div class="grupo-titulo">Ativos encontrados (${encontrados.length})</div>` : '') +
    encontrados.map(([cod,info])=>{
      const done   = carregados[info.circ];
      const isAtivo= itemAtivo===cod;
      return `<div class="item${done?' carregado':''}" id="li-${cod}" onclick="selecionarAtivo('${cod}')">
        <div class="item-dot ${done?'dot-done':'dot-ok'}"></div>
        <div class="item-info">
          <div class="item-cod" style="${isAtivo?'color:#ff5252':''}">${cod}</div>
          <div class="item-sub">${info.se}</div>
          <span class="item-tag tag-circ">${info.circ} · ${info.polo}</span>
        </div>
      </div>`;
    }).join('') +
    (naos.length ? `<div class="grupo-titulo">Não encontrados nos KMLs (${naos.length})</div>` : '') +
    naos.map(cod=>`<div class="item nao-encontrado">
      <div class="item-dot dot-na"></div>
      <div class="item-info">
        <div class="item-cod">${cod}</div>
        <div class="item-sub">Não localizado nos alimentadores</div>
        <span class="item-tag tag-na">não encontrado</span>
      </div>
    </div>`).join('');
}

// ── Selecionar ativo ──
async function selecionarAtivo(cod){
  const info = INDICE[cod];
  if(!info) return;
  itemAtivo = cod;

  const circ = info.circ;
  const el   = document.getElementById('li-'+cod);

  // Se o alimentador já está no mapa → só centralizar no ativo
  if(carregados[circ]){
    map.setView([info.lat,info.lon],15,{animate:true});
    destacarAtivo(cod,info);
    renderLista(document.getElementById('busca').value);
    return;
  }

  // Marcar como carregando
  if(el){ el.classList.add('carregando'); el.querySelector('.item-dot').className='item-dot dot-loading'; }

  try {
    const r = await fetch(BASE+circ+'.json?t='+Date.now());
    if(!r.ok) throw new Error('HTTP '+r.status);
    const d = await r.json();
    carregados[circ] = true;
    renderAlimentador(circ, d);
    destacarAtivo(cod,info);
    // Zoom para o ativo selecionado
    map.setView([info.lat,info.lon],14,{animate:true});
    atualizarLoadedBar();
  } catch(e){
    showToast('Erro ao carregar '+circ+': '+e.message);
  } finally {
    renderLista(document.getElementById('busca').value);
  }
}

// ── Renderizar alimentador no mapa ──
let alvoMarkers = {}; // cod → marker (para destacar)

function renderAlimentador(circ, d){
  const pts=[];
  d.t1.forEach(l=>{
    const p=l.map(c=>[c[1],c[0]]);
    L.polyline(p,{color:'#e53935',weight:2.5,opacity:.9}).addTo(LY.t1);
    p.forEach(x=>pts.push(x));
  });
  d.t2.forEach(l=>{
    const p=l.map(c=>[c[1],c[0]]);
    L.polyline(p,{color:'#fb8c00',weight:1.8,opacity:.85}).addTo(LY.t2);
    p.forEach(x=>pts.push(x));
  });
  d.chaves.forEach(c=>{
    const isAlvo = isAtivoAlvo(c.nome);
    if(isAlvo){
      const m = L.circleMarker([c.lat,c.lon],{
        radius:9,fillColor:'#ff1744',color:'#fff',weight:2.5,fillOpacity:1
      }).bindPopup(popupAlvo(c.nome,d)).addTo(LY.alvo);
      alvoMarkers[c.nome]=m;
    } else {
      L.circleMarker([c.lat,c.lon],{
        radius:4,fillColor:'#7e57c2',color:'#fff',weight:1.5,fillOpacity:.8
      }).bindPopup(`<b>${c.nome}</b><br>Chave · ${circ}`).addTo(LY.ch);
    }
    pts.push([c.lat,c.lon]);
  });
  d.trafos.forEach(t=>{
    L.circleMarker([t.lat,t.lon],{
      radius:3,fillColor:'#1e88e5',color:'#fff',weight:1,fillOpacity:.8
    }).bindPopup(`<b>Trafo ${t.nome}</b><br>${circ}`).addTo(LY.tr);
    pts.push([t.lat,t.lon]);
  });
  if(pts.length) bounds_circ[circ]=L.latLngBounds(pts);
}

function popupAlvo(cod,d){
  const info=INDICE[cod]||{};
  return `<div style="min-width:160px">
    <div style="font-weight:700;font-size:13px;color:#ff5252">⚑ Ativo de referência</div>
    <div style="color:#aaa;font-size:10px;margin:3px 0 6px">${d.circ} · ${d.se}</div>
    <div style="font-size:11px;line-height:1.8">
      <b>Código:</b> ${cod}<br>
      <b>Polo:</b> ${d.polo}<br>
      <b>Lat:</b> ${info.lat||''}<br>
      <b>Lon:</b> ${info.lon||''}
    </div>
  </div>`;
}

function destacarAtivo(cod,info){
  // Abrir popup do ativo
  const m=alvoMarkers[cod];
  if(m) m.openPopup();
}

function isAtivoAlvo(cod){
  return !!INDICE[cod];
}

// ── Loaded bar ──
function atualizarLoadedBar(){
  const bar=document.getElementById('loaded-bar');
  const circs=Object.keys(carregados);
  if(!circs.length){
    bar.innerHTML='<span style="color:#555;font-size:10px;">Nenhum alimentador carregado</span>';
    return;
  }
  bar.innerHTML=circs.map(c=>`<span class="loaded-chip" onclick="zoomAlimentador('${c}')" title="Zoom: ${c}">${c}</span>`).join('')
    +`<button id="btn-limpar" onclick="limparTudo()">Limpar</button>`;
}

function zoomAlimentador(circ){
  if(bounds_circ[circ]) map.fitBounds(bounds_circ[circ],{padding:[20,20]});
}

function limparTudo(){
  ['t1','t2','ch','tr','alvo'].forEach(k=>LY[k].clearLayers());
  carregados={};
  bounds_circ={};
  alvoMarkers={};
  itemAtivo=null;
  atualizarLoadedBar();
  renderLista(document.getElementById('busca').value);
}

// ── Toast ──
function showToast(msg){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';
    t.style.cssText='position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:8px 16px;border-radius:8px;font-size:12px;z-index:9999';
    document.body.appendChild(t);}
  t.textContent=msg; t.style.display='block';
  setTimeout(()=>t.style.display='none',3000);
}

function filtrar(v){ renderLista(v); }

// ── INIT ──
fetch('indice.json').then(r=>r.json()).then(d=>{
  INDICE           = d.chaves||{};
  NAO_ENCONTRADAS  = d.nao_encontradas||[];
  renderLista();
  atualizarLoadedBar();
}).catch(e=>{
  document.getElementById('lista').innerHTML=
    '<div style="padding:20px;color:#666;font-size:12px;">Erro ao carregar índice: '+e.message+'</div>';
});
</script>
</body>
</html>
